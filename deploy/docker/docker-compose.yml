# Local full stack. From repo root:
#   cp deploy/docker/.env.example deploy/docker/.env
#   docker compose -f deploy/docker/docker-compose.yml up --build

name: x-executor

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nats:
    build:
      context: ../..
      dockerfile: deploy/docker/nats-js/Dockerfile
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data

  hub:
    build:
      context: ../..
      dockerfile: deploy/docker/hub/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
      MONGODB_URI: mongodb://mongodb:27017/x-executor
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
    depends_on:
      - mongodb
      - redis
      - nats

  webhook:
    build:
      context: ../..
      dockerfile: deploy/docker/webhook/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      PORT: "3001"
      MONGODB_URI: mongodb://mongodb:27017/x-executor
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
    depends_on:
      - mongodb
      - redis
      - nats

  processor:
    build:
      context: ../..
      dockerfile: deploy/docker/processor/Dockerfile
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      PORT: "3002"
      MONGODB_URI: mongodb://mongodb:27017/x-executor
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
    depends_on:
      - mongodb
      - redis
      - nats

  sender:
    build:
      context: ../..
      dockerfile: deploy/docker/sender/Dockerfile
    ports:
      - "3003:3003"
    env_file:
      - .env
    environment:
      PORT: "3003"
      MONGODB_URI: mongodb://mongodb:27017/x-executor
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
    depends_on:
      - mongodb
      - redis
      - nats

  scheduler:
    build:
      context: ../..
      dockerfile: deploy/docker/scheduler/Dockerfile
    ports:
      - "3004:3004"
    env_file:
      - .env
    environment:
      PORT: "3004"
      MONGODB_URI: mongodb://mongodb:27017/x-executor
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
    depends_on:
      - mongodb
      - redis
      - nats

  analytics:
    build:
      context: ../..
      dockerfile: deploy/docker/analytics/Dockerfile
    ports:
      - "3005:3005"
    env_file:
      - .env
    environment:
      PORT: "3005"
      MONGODB_URI: mongodb://mongodb:27017/x-executor
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
    depends_on:
      - mongodb
      - redis
      - nats

volumes:
  mongo_data:
  nats_data:
