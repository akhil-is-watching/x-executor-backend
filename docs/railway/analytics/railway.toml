# Campaign analytics — set this path in Railway: /docs/railway/analytics/railway.toml

[build]
buildCommand = "yarn build:analytics"
watchPatterns = [
  "apps/analytics/**",
  "libs/**",
  "package.json",
  "yarn.lock",
  "nest-cli.json",
  "tsconfig*.json",
]

[deploy]
startCommand = "yarn start:analytics:prod"
healthcheckPath = "/xbot/v1/api/analytics/health"
restartPolicyType = "ON_FAILURE"
