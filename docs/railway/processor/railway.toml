# DM processor — set this path in Railway: /docs/railway/processor/railway.toml

[build]
buildCommand = "yarn build:processor"
watchPatterns = [
  "apps/processor/**",
  "libs/**",
  "package.json",
  "yarn.lock",
  "nest-cli.json",
  "tsconfig*.json",
  "webpack.config.js",
]

[deploy]
startCommand = "yarn start:processor:prod"
healthcheckPath = "/xbot/v1/api/processor/health"
restartPolicyType = "ON_FAILURE"
