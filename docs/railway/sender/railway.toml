# DM sender — set this path in Railway: /docs/railway/sender/railway.toml

[build]
buildCommand = "yarn build:sender"
watchPatterns = [
  "apps/sender/**",
  "libs/**",
  "package.json",
  "yarn.lock",
  "nest-cli.json",
  "tsconfig*.json",
  "webpack.config.js",
]

[deploy]
startCommand = "yarn start:sender:prod"
healthcheckPath = "/xbot/v1/api/sender/health"
restartPolicyType = "ON_FAILURE"
