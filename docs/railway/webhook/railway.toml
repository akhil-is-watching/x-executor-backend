# Webhook ingress — set this path in Railway: /docs/railway/webhook/railway.toml

[build]
buildCommand = "yarn build:webhook"
watchPatterns = [
  "apps/webhook/**",
  "libs/**",
  "package.json",
  "yarn.lock",
  "nest-cli.json",
  "tsconfig*.json",
  "webpack.config.js",
]

[deploy]
startCommand = "yarn start:webhook:prod"
healthcheckPath = "/xbot/v1/api/health"
restartPolicyType = "ON_FAILURE"
